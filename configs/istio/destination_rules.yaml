# ── notification-svc ──────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: notification-svc
  namespace: fraud-detection
spec:
  host: notification-svc
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        http2MaxRequests: 2000
        maxRequestsPerConnection: 20
      tcp:
        maxConnections: 200
        connectTimeout: 50ms        # looser — notification is not latency-critical
    outlierDetection:
      consecutive5xxErrors: 10      # more tolerant — retries handle transient failures
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
