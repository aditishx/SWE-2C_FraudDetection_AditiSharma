# Istio DestinationRules — Connection Pools, TLS, Circuit Breakers per Service
# Day 10 Deliverable | Author: Aditi Sharma | Date: 8 July 2026

# ── transaction-ingestion-svc ─────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: transaction-ingestion-svc
  namespace: fraud-detection
spec:
  host: transaction-ingestion-svc
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL          # mTLS enforced by Istio sidecar
    connectionPool:
      http:
        http2MaxRequests: 10000
        maxRequestsPerConnection: 100
      tcp:
        maxConnections: 1000
        connectTimeout: 10ms
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---

# ── rule-engine-svc ───────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: rule-engine-svc
  namespace: fraud-detection
spec:
  host: rule-engine-svc
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        http2MaxRequests: 5000
        maxRequestsPerConnection: 50
      tcp:
        maxConnections: 500
        connectTimeout: 5ms         # tighter — rule engine must be fast
    outlierDetection:
      consecutive5xxErrors: 3       # eject faster for critical-path service
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 30
---

