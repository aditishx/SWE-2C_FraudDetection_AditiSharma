// fraud_detection_events.proto
// Day 4 Deliverable — Event Schema Definitions (Protobuf)
// Author: Aditi Sharma | Date: 1 July 2026
// Schema Registry compatibility: BACKWARD for most topics, FULL for audit events

syntax = "proto3";
package fraud.events.v1;
option java_package = "com.shieldpay.fraud.events.v1";

// ─────────────────────────────────────────────
// Shared types
// ─────────────────────────────────────────────

enum Channel {
  CHANNEL_UNSPECIFIED = 0;
  CHANNEL_POS         = 1;
  CHANNEL_ECOMMERCE   = 2;
  CHANNEL_ATM         = 3;
  CHANNEL_UPI         = 4;
  CHANNEL_MOBILE      = 5;
}

enum RiskAction {
  ACTION_UNSPECIFIED     = 0;
  ACTION_AUTO_APPROVE    = 1;
  ACTION_STEP_UP_AUTH    = 2;
  ACTION_MANUAL_REVIEW   = 3;
  ACTION_AUTO_DECLINE    = 4;
}

// ─────────────────────────────────────────────
// Topic: fraud.transactions.raw
// ─────────────────────────────────────────────

message TransactionEvent {
  string  transaction_id   = 1;  // UUID, globally unique
  string  card_number_hash = 2;  // SHA-256 of PAN — never raw PAN
  string  merchant_id      = 3;
  string  merchant_mcc     = 4;  // 4-digit MCC code
  double  amount           = 5;
  string  currency_code    = 6;  // ISO 4217
  Channel channel          = 7;
  string  timestamp        = 8;  // ISO 8601 UTC
  string  terminal_id      = 9;
  string  trace_id         = 10; // OpenTelemetry trace ID — propagated through all events
}

// ─────────────────────────────────────────────
// Topic: fraud.transactions.enriched
// ─────────────────────────────────────────────

message DeviceInfo {
  string device_fingerprint = 1;
  string os                 = 2;
  string browser            = 3;
  bool   is_jailbroken      = 4;
  string imei_hash          = 5;
}

message GeoInfo {
  string ip_hash   = 1;
  string country   = 2;
  string city      = 3;
  bool   is_vpn    = 4;
  bool   is_proxy  = 5;
  bool   is_tor    = 6;
}

message EnrichedTransactionEvent {
  TransactionEvent base        = 1;  // full raw transaction embedded
  DeviceInfo       device      = 2;
  GeoInfo          geo         = 3;
  double           customer_risk_tier          = 4;
  double           avg_transaction_amount_90d  = 5;
  int32            txn_count_last_10_minutes   = 6;
  double           distance_from_home_km       = 7;
  string           enrichment_timestamp        = 8;
}

// ─────────────────────────────────────────────
// Topic: fraud.rule.results
// ─────────────────────────────────────────────

enum RuleResult {
  RULE_RESULT_UNSPECIFIED = 0;
  RULE_RESULT_PASS        = 1;
  RULE_RESULT_TRIGGER     = 2;
}

message RuleEvaluationResult {
  string     transaction_id = 1;
  string     trace_id       = 2;
  double     rule_score     = 3;  // 0-1000 composite from all triggered rules
  repeated RuleHit hits     = 4;
  string     evaluated_at   = 5;

  message RuleHit {
    string      rule_id          = 1;
    string      rule_name        = 2;
    string      rule_version     = 3;
    RuleResult  result           = 4;
    double      score_delta      = 5;
    string      matched_condition = 6; // human-readable: "txn_count_10min=7 > threshold=5"
  }
}

// ─────────────────────────────────────────────
// Topic: fraud.anomaly.scores
// ─────────────────────────────────────────────

message FeatureContribution {
  string feature_name  = 1;
  double feature_value = 2;
  double shap_value    = 3;
}

message AnomalyScore {
  string   transaction_id           = 1;
  string   trace_id                 = 2;
  double   ml_score                 = 3;   // 0-1000
  double   supervised_score         = 4;
  double   unsupervised_score       = 5;
  string   model_version            = 6;
  repeated FeatureContribution top_features = 7;
  string   scored_at                = 8;
}

// ─────────────────────────────────────────────
// Topic: fraud.graph.signals
// ─────────────────────────────────────────────

message GraphSignals {
  string transaction_id          = 1;
  string trace_id                = 2;
  double graph_score             = 3;   // 0-1000
  int32  hops_to_known_fraud     = 4;   // -1 if no path found
  double community_suspicion     = 5;   // 0-1 Louvain community risk score
  double centrality_rank         = 6;   // PageRank of the card node
  string fraud_topology_matched  = 7;   // e.g. "triangulation_v2", "" if none
  string analysed_at             = 8;
}

// ─────────────────────────────────────────────
// Topic: fraud.risk.decisions
// ─────────────────────────────────────────────

message RiskDecision {
  string     transaction_id  = 1;
  string     trace_id        = 2;
  double     composite_score = 3;
  RiskAction action          = 4;
  double     rule_weight     = 5;
  double     ml_weight       = 6;
  double     graph_weight    = 7;
  string     explanation     = 8;  // human-readable summary for regulators
  string     decided_at      = 9;
  bool       graph_signal_used = 10; // false if graph timed out and was skipped
}

// ─────────────────────────────────────────────
// Topic: fraud.audit.events
// Schema Registry compatibility: FULL (no breaking changes ever)
// ─────────────────────────────────────────────

enum AuditEventType {
  AUDIT_UNSPECIFIED         = 0;
  AUDIT_RISK_DECISION       = 1;
  AUDIT_RULE_CHANGE         = 2;
  AUDIT_MODEL_DEPLOYMENT    = 3;
  AUDIT_THRESHOLD_CHANGE    = 4;
  AUDIT_USER_DATA_ACCESS    = 5;
  AUDIT_CASE_DECISION       = 6;
  AUDIT_CONFIG_CHANGE       = 7;
}

message AuditEvent {
  string         event_type     = 1;  // AuditEventType as string for forward compatibility
  string         timestamp      = 2;
  string         actor_id       = 3;
  string         actor_role     = 4;
  string         resource_type  = 5;
  string         resource_id    = 6;
  string         action         = 7;
  string         before_state   = 8;  // JSON serialised
  string         after_state    = 9;  // JSON serialised
  string         justification  = 10;
  string         trace_id       = 11;
  string         hash           = 12; // SHA-256 of this event's fields
  string         previous_hash  = 13; // hash of the previous AuditEvent — Merkle chain
}

// ─────────────────────────────────────────────
// Topic: notifications.outbound
// ─────────────────────────────────────────────

enum NotificationChannel {
  NOTIF_UNSPECIFIED = 0;
  NOTIF_SMS         = 1;
  NOTIF_EMAIL       = 2;
  NOTIF_PUSH        = 3;
  NOTIF_IN_APP      = 4;
  NOTIF_WEBHOOK     = 5;
  NOTIF_SLACK       = 6;
  NOTIF_PAGERDUTY   = 7;
}

message NotificationRequest {
  string              notification_id  = 1;
  string              trace_id         = 2;
  string              recipient_id     = 3;
  NotificationChannel channel          = 4;
  string              template_id      = 5;
  string              locale           = 6;  // e.g. "hi-IN", "en-IN", "mr-IN"
  map<string, string> template_params  = 7;
  string              requested_at     = 8;
}
