# Schema Registry Configuration
# Day 4 Deliverable | Author: Aditi Sharma | Date: 1 July 2026
# Using Confluent Schema Registry (self-hosted or Confluent Cloud)

schema_registry:
  url: "http://schema-registry:8081"
  security:
    protocol: SSL
    ssl_keystore_location: /vault/secrets/schema-registry-keystore.jks

topics:
  - name: fraud.transactions.raw
    schema_file: fraud_detection_events.proto
    message_type: fraud.events.v1.TransactionEvent
    compatibility: BACKWARD
    # BACKWARD: new schema can read data written by old schema
    # Safe for adding new optional fields

  - name: fraud.transactions.enriched
    schema_file: fraud_detection_events.proto
    message_type: fraud.events.v1.EnrichedTransactionEvent
    compatibility: BACKWARD

  - name: fraud.rule.results
    schema_file: fraud_detection_events.proto
    message_type: fraud.events.v1.RuleEvaluationResult
    compatibility: BACKWARD

  - name: fraud.anomaly.scores
    schema_file: fraud_detection_events.proto
    message_type: fraud.events.v1.AnomalyScore
    compatibility: BACKWARD

  - name: fraud.graph.signals
    schema_file: fraud_detection_events.proto
    message_type: fraud.events.v1.GraphSignals
    compatibility: BACKWARD

  - name: fraud.risk.decisions
    schema_file: fraud_detection_events.proto
    message_type: fraud.events.v1.RiskDecision
    compatibility: BACKWARD

  - name: notifications.outbound
    schema_file: fraud_detection_events.proto
    message_type: fraud.events.v1.NotificationRequest
    compatibility: BACKWARD

  - name: fraud.audit.events
    schema_file: fraud_detection_events.proto
    message_type: fraud.events.v1.AuditEvent
    compatibility: FULL
    # FULL: new schema must be able to read old data AND old schema must
    # be able to read new data. Stricter than BACKWARD — required for
    # audit events because regulators may query historical data using
    # any schema version and must always get a valid result.
